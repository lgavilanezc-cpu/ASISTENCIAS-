<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --teal: #0f766e;
    --teal-light: #14b8a6;
    --teal-dark: #0d5c56;
    --amber: #f59e0b;
    --amber-light: #fcd34d;
    --bg: #f0fdfa;
    --card: #ffffff;
    --border: #99f6e4;
    --text: #134e4a;
    --muted: #5eead4;
    --danger: #ef4444;
    --success: #10b981;
    --gray: #f1f5f9;
    --gray2: #e2e8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 60%, var(--teal-light) 100%);
    color: white;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20%;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(245,158,11,0.15);
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 2;
  }
  .header-icon {
    width: 54px; height: 54px;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    border: 1.5px solid rgba(255,255,255,0.25);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header p {
    font-size: 0.85rem;
    opacity: 0.8;
    margin-top: 2px;
  }

  nav {
    background: white;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(15,118,110,0.08);
  }
  .nav-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: #64748b;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-btn.active {
    color: var(--teal);
    border-bottom-color: var(--teal);
    background: var(--bg);
  }
  .nav-btn:hover:not(.active) {
    color: var(--teal-light);
    background: #f8fffe;
  }

  main { max-width: 960px; margin: 0 auto; padding: 28px 16px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ── REGISTRO PANEL ── */
  .employee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .emp-card {
    background: white;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 18px 20px;
    transition: box-shadow 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .emp-card:hover {
    box-shadow: 0 6px 24px rgba(15,118,110,0.12);
    transform: translateY(-1px);
  }
  .emp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
  }

  .emp-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .emp-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    flex-shrink: 0;
  }
  .emp-info { flex: 1; min-width: 0; }
  .emp-name {
    font-weight: 600;
    font-size: 0.9rem;
    line-height: 1.3;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .emp-code {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.78rem;
    color: var(--teal);
    font-weight: 600;
    letter-spacing: 0.5px;
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 3px;
  }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .time-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .time-group input[type="time"] {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--gray2);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: var(--gray);
    transition: border-color 0.2s;
    outline: none;
  }
  .time-group input[type="time"]:focus {
    border-color: var(--teal-light);
    background: white;
  }

  .date-row {
    margin-bottom: 12px;
  }
  .date-row label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .date-row input[type="date"] {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--gray2);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: var(--gray);
    transition: border-color 0.2s;
    outline: none;
  }
  .date-row input[type="date"]:focus {
    border-color: var(--teal-light);
    background: white;
  }

  .btn-save {
    width: 100%;
    padding: 9px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-save:hover { opacity: 0.9; transform: scale(0.99); }
  .btn-save:active { transform: scale(0.97); }

  .saved-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--success);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    display: none;
    animation: pop 0.3s ease;
  }
  @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ── REPORTE PANEL ── */
  .report-top {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
  }
  .filter-group label { font-size: 0.82rem; font-weight: 500; color: #64748b; }
  .filter-group input[type="date"] {
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: transparent;
  }

  .btn-excel {
    padding: 10px 20px;
    background: linear-gradient(135deg, #166534, #16a34a);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: opacity 0.2s;
    margin-left: auto;
  }
  .btn-excel:hover { opacity: 0.9; }

  .btn-clear {
    padding: 10px 16px;
    background: white;
    color: var(--danger);
    border: 1.5px solid #fecaca;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background 0.2s;
  }
  .btn-clear:hover { background: #fef2f2; }

  .report-table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: white;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  thead tr {
    background: linear-gradient(90deg, var(--teal-dark), var(--teal));
    color: white;
  }
  thead th {
    padding: 12px 14px;
    text-align: left;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--gray2); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 10px 14px; }
  .td-code {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    color: var(--teal);
    font-size: 0.88rem;
  }
  .td-name { font-weight: 500; }
  .td-time {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #94a3b8;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--teal-dark);
    color: white;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 0.88rem;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .stat-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .chip {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chip-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--teal);
  }
  .chip-label { font-size: 0.78rem; color: #64748b; font-weight: 500; }

  @media (max-width: 600px) {
    .employee-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">⏱️</div>
    <div>
      <h1>CONTROL DE ASISTENCIA</h1>
      <p>Registro de horas de entrada y salida del personal</p>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showPanel('registro')">📋 Registrar Horas</button>
    <button class="nav-btn" onclick="showPanel('reporte')">📊 Reporte / Excel</button>
  </div>
</nav>

<main>
  <!-- PANEL REGISTRO -->
  <div class="panel active" id="panel-registro">
    <div class="employee-grid" id="employee-grid"></div>
  </div>

  <!-- PANEL REPORTE -->
  <div class="panel" id="panel-reporte">
    <div class="report-top">
      <div class="filter-group">
        <label>📅 Desde:</label>
        <input type="date" id="filter-from">
      </div>
      <div class="filter-group">
        <label>📅 Hasta:</label>
        <input type="date" id="filter-to">
      </div>
      <button class="btn-excel" onclick="exportExcel()">
        <span>📥</span> Descargar Excel
      </button>
      <button class="btn-clear" onclick="clearAll()">
        <span>🗑️</span> Limpiar
      </button>
    </div>

    <div class="stat-chips" id="stat-chips"></div>

    <div class="report-table-wrap">
      <table>
        <thead>
          <tr>
            <th>CÓDIGO</th>
            <th>APELLIDOS Y NOMBRES</th>
            <th>FECHA</th>
            <th>DÍA</th>
            <th>HORA ENTRADA</th>
            <th>HORA SALIDA</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast">✅ Guardado correctamente</div>

<script>
const EMPLOYEES = [
  { code: 'EMP-001', name: 'LEIDY VANESSA GAVILANEZ CAYAMBE' },
  { code: 'EMP-002', name: 'MELANI LISBETH LUIS SANTOS' },
  { code: 'EMP-003', name: 'JULIO CESAR YUGCHA RAMIREZ' },
  { code: 'EMP-004', name: 'JORGE ERMEL PERALTA GUANGA' },
  { code: 'EMP-005', name: 'JHONNY JOEL ARANA BRAVO' },
  { code: 'EMP-006', name: 'ELIZABETH PATRICIA GUAMAN ALARCON' },
  { code: 'EMP-007', name: 'PABLO CESAR LAINEZA' },
];

const STORAGE_KEY = 'asistencia_v1';

function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('');
}

function dayName(dateStr) {
  const days = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  const d = new Date(dateStr + 'T12:00:00');
  return days[d.getDay()];
}

function buildGrid() {
  const grid = document.getElementById('employee-grid');
  grid.innerHTML = '';
  const today = todayStr();

  EMPLOYEES.forEach((emp, i) => {
    const card = document.createElement('div');
    card.className = 'emp-card';
    card.id = `card-${emp.code}`;

    card.innerHTML = `
      <span class="saved-badge" id="badge-${emp.code}">✓ Guardado</span>
      <div class="emp-header">
        <div class="emp-avatar">${initials(emp.name)}</div>
        <div class="emp-info">
          <div class="emp-name">${emp.name}</div>
          <span class="emp-code">${emp.code}</span>
        </div>
      </div>
      <div class="date-row">
        <label>📅 Fecha</label>
        <input type="date" id="date-${emp.code}" value="${today}">
      </div>
      <div class="time-row">
        <div class="time-group">
          <label>🟢 Hora Entrada</label>
          <input type="time" id="in-${emp.code}">
        </div>
        <div class="time-group">
          <label>🔴 Hora Salida</label>
          <input type="time" id="out-${emp.code}">
        </div>
      </div>
      <button class="btn-save" onclick="saveEntry('${emp.code}', '${emp.name}')">
        💾 Guardar Registro
      </button>
    `;
    grid.appendChild(card);
  });
}

function saveEntry(code, name) {
  const date = document.getElementById(`date-${code}`).value;
  const entrada = document.getElementById(`in-${code}`).value;
  const salida = document.getElementById(`out-${code}`).value;

  if (!date || (!entrada && !salida)) {
    showToast('⚠️ Ingresa al menos una hora', '#b45309');
    return;
  }

  const records = getRecords();
  const idx = records.findIndex(r => r.code === code && r.date === date);
  const rec = { code, name, date, entrada, salida, dia: dayName(date) };

  if (idx >= 0) records[idx] = rec;
  else records.push(rec);

  saveRecords(records);
  showToast('✅ Registro guardado');

  const badge = document.getElementById(`badge-${code}`);
  badge.style.display = 'block';
  setTimeout(() => badge.style.display = 'none', 3000);
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  event.target.classList.add('active');

  if (name === 'reporte') renderReport();
}

function renderReport() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  let records = getRecords();

  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);

  records.sort((a, b) => a.date.localeCompare(b.date) || a.code.localeCompare(b.code));

  const tbody = document.getElementById('report-body');
  const chips = document.getElementById('stat-chips');

  if (records.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>No hay registros para mostrar.<br>Ve a "Registrar Horas" y guarda datos.</p>
      </div>
    </td></tr>`;
    chips.innerHTML = '';
    return;
  }

  tbody.innerHTML = records.map(r => `
    <tr>
      <td class="td-code">${r.code}</td>
      <td class="td-name">${r.name}</td>
      <td>${r.date}</td>
      <td><strong>${r.dia}</strong></td>
      <td class="td-time" style="color:#16a34a">${r.entrada || '-'}</td>
      <td class="td-time" style="color:#dc2626">${r.salida || '-'}</td>
    </tr>
  `).join('');

  const uniqueEmps = new Set(records.map(r => r.code)).size;
  chips.innerHTML = `
    <div class="chip"><span class="chip-val">${records.length}</span><span class="chip-label">Registros</span></div>
    <div class="chip"><span class="chip-val">${uniqueEmps}</span><span class="chip-label">Empleados</span></div>
  `;
}

function exportExcel() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  let records = getRecords();

  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  records.sort((a, b) => a.date.localeCompare(b.date) || a.code.localeCompare(b.code));

  if (records.length === 0) {
    showToast('⚠️ No hay registros para exportar', '#b45309');
    return;
  }

  const wb = XLSX.utils.book_new();
  const wsData = [
    ['CÓDIGO', 'APELLIDOS Y NOMBRES', 'FECHA', 'DÍA', 'HORA DE ENTRADA', 'HORA DE SALIDA']
  ];
  records.forEach(r => {
    wsData.push([r.code, r.name, r.date, r.dia, r.entrada || '', r.salida || '']);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [
    { wch: 12 }, { wch: 40 }, { wch: 14 }, { wch: 8 }, { wch: 16 }, { wch: 16 }
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');

  const date = new Date().toLocaleDateString('es-EC').replace(/\//g, '-');
  XLSX.writeFile(wb, `Control_Asistencia_${date}.xlsx`);
  showToast('📥 Excel descargado');
}

function clearAll() {
  if (confirm('¿Eliminar TODOS los registros guardados? Esta acción no se puede deshacer.')) {
    localStorage.removeItem(STORAGE_KEY);
    renderReport();
    showToast('🗑️ Registros eliminados', '#dc2626');
  }
}

function showToast(msg, color = '#0f766e') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// init
buildGrid();

// set default filter dates (current week)
const td = todayStr();
document.getElementById('filter-to').value = td;
const weekStart = new Date();
weekStart.setDate(weekStart.getDate() - 6);
document.getElementById('filter-from').value = weekStart.toISOString().slice(0, 10);
</script>
</body>
</html>
